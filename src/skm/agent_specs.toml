# Temporary workaround for openclaw loading: keep standard materialized too.
# Ref: https://github.com/reorx/skm/issues/4#issuecomment-4072072529
[agents.standard]
path = "~/.agents/skills"
install_mode = "materialize"

# Claude Code supports overriding its config root with CLAUDE_CONFIG_DIR.
# Ref: https://github.com/anthropics/claude-code/blob/main/CHANGELOG.md
[agents.claude]
path = "~/.claude/skills"
parent_env_var = "CLAUDE_CONFIG_DIR"

# Codex uses CODEX_HOME as its configurable home directory.
# Ref: https://github.com/openai/codex/blob/main/docs/config.md
[agents.codex]
path = "~/.codex/skills"
parent_env_var = "CODEX_HOME"

# Openclaw needs materialized skills under the expected in-home skills path.
# Ref: https://github.com/reorx/skm/issues/4#issuecomment-4072072529
[agents.openclaw]
path = "~/.openclaw/skills"
install_mode = "materialize"

# pi-mono coding-agent supports overriding its agent dir with PI_CODING_AGENT_DIR.
# Ref: https://github.com/badlogic/pi-mono/blob/main/packages/coding-agent/README.md
[agents.pi]
path = "~/.pi/agent/skills"
parent_env_var = "PI_CODING_AGENT_DIR"
